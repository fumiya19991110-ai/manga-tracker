name: Manga Update Check

on:
  schedule:
    # JST 8:00, 12:00, 18:00, 23:00 に実行（UTC -9h）
    - cron: "0 23 * * *"   # JST 8:00
    - cron: "0 3 * * *"    # JST 12:00
    - cron: "0 9 * * *"    # JST 18:00
    - cron: "0 14 * * *"   # JST 23:00
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run check script
        run: python scripts/check_manga.py

      - name: Commit and push if updated
        run: |
          git config user.name "fumiya19991110-ai"
          git config user.email "fumiya19991110-ai@users.noreply.github.com"
          git add data/status.json
          if git diff --cached --quiet; then
            echo "変更なし、コミットをスキップ"
          else
            git commit -m "chore: update latest chapter to $(python -c "import json; d=json.load(open('data/status.json')); print(d['latest_chapter'])")"
            git push
          fi
